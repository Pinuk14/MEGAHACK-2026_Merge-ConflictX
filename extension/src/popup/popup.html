<!DOCTYPE html>
<html>
<head>
  <title>Page Analyzer</title>
  <style>
    body { font-family: Arial, sans-serif; width: 360px; margin: 10px; }
    #chat { height: 200px; overflow-y: auto; border: 1px solid #ddd; padding: 8px; border-radius: 6px; }
    .msg { margin: 6px 0; }
    .user { font-weight: bold; }
    .bot { color: #333; }
    #analysis { margin-bottom: 12px; }
    #analysisControls { display: flex; align-items: center; gap: 8px; }
    #analysisSummary { margin-top: 8px; }
    #analysisStatus { color: #888; margin-top: 6px; }
    #analysisError { color: red; margin-top: 6px; }
    #copilotSettings { margin-top: 12px; border: 1px solid #eee; border-radius: 8px; padding: 10px; }
    .row { display: flex; gap: 6px; margin-top: 6px; }
    .row input { flex: 1; padding: 6px; }
    .small { font-size: 12px; color: #666; margin-top: 4px; }
    .toggleRow { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    #controls { display: flex; gap: 6px; margin-top: 8px; }
    #prompt { flex: 1; padding: 6px; }
    #sendBtn { padding: 6px 12px; }
    #chatStatus { color: #888; margin-top: 8px; }
    #chatError { color: red; margin-top: 8px; }
    hr { margin: 12px 0; border: none; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <h2>Page Analyzer</h2>
  <div id="analysis">
    <div id="analysisControls">
      <button id="analyzeBtn">Analyze This Page</button>
      <label>
        <input id="autoAnalyzeToggle" type="checkbox" /> Analyze all pages
      </label>
    </div>
    <div id="analysisStatus"></div>
    <div id="analysisSummary"></div>
    <div id="analysisError"></div>
  </div>

  <div id="copilotSettings">
    <h3>Copilot Memory</h3>
    <div class="toggleRow">
      <label><input id="assistModeToggle" type="checkbox" /> Assist mode</label>
      <label><input id="autofillToggle" type="checkbox" /> Auto-fill forms</label>
      <label><input id="continuousLoopToggle" type="checkbox" /> Continuous loop</label>
    </div>
    <div class="row">
      <input id="profileName" type="text" placeholder="Name" />
      <input id="profileEmail" type="email" placeholder="Email" />
    </div>
    <div class="row">
      <input id="profilePhone" type="text" placeholder="Phone" />
      <input id="profileAddress" type="text" placeholder="Address" />
    </div>
    <button id="saveProfileBtn">Save Profile</button>

    <div class="small" id="domainLabel">Current site: unknown</div>
    <div class="row">
      <input id="siteUsername" type="text" placeholder="Site username" />
      <input id="siteEmail" type="email" placeholder="Site email" />
    </div>
    <div class="row">
      <input id="sitePassword" type="password" placeholder="Site password" />
      <button id="saveSiteCredsBtn">Save Site Login</button>
    </div>
    <div class="small" id="copilotStatus"></div>
  </div>

  <hr />

  <h3>Chatbot & Automation</h3>
  <div id="chat"></div>
  <div id="controls">
    <input id="prompt" type="text" placeholder="Type a command..." />
    <button id="sendBtn">Send</button>
  </div>
  <div style="margin-top:8px; display:flex; gap:6px;">
    <input id="mapGoal" type="text" placeholder="Map goal (e.g. change password)" style="flex:1; padding:6px;" />
    <button id="planMapBtn">Plan (Map)</button>
  </div>
  <div id="chatStatus"></div>
  <div id="chatError"></div>
  <script src="popup.js"></script>
</body>
</html>
